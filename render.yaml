services:
  # 🚀 Backend Django
  - type: web
    name: healthcare-etl-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn config.wsgi:application
    pythonVersion: 3.12
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        value: postgresql://postgres.lufdsomzgtuhqxqslbya:Porque123esasi@aws-1-us-east-1.pooler.supabase.com:5432/postgres
      - key: CORS_ALLOWED_ORIGINS
        value: https://healthcare-etl-plataform-1.onrender.com,http://localhost:3000

  # 🎨 Frontend React + Vite + Bun
  - type: web
    name: healthcare-etl-frontend
    runtime: node
    buildCommand: bun run build
    startCommand: bun run preview
    envVars:
      - key: VITE_API_URL
        value: https://healthcare-etl-plataform.onrender.com

databases:
  # 🗄️ Base de datos PostgreSQL (Supabase/Render)
  - name: healthcare-etl-db
    databaseName: postgres
    user: postgres
    plan: free
